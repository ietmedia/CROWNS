<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowns Enchanted Beauty Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Robust script loader for various preview hosts:
      // - Works for root hosting (/)
      // - Works for sub-path hosting (/foo/, /foo)
      // - Works for preview IDs embedded in the path (e.g. /iad1::...)
      // - Ensures SDK scripts load BEFORE planner.js
      (function () {
        var origin = window.location.origin;
        var path = window.location.pathname || "/";

        function computeBasePath(p) {
          if (p.endsWith("/")) return p;
          if (p.includes(".")) return p.replace(/[^/]*$/, "");
          return p + "/";
        }

        var basePath = computeBasePath(path);

        // Try resolving under the current path first, then fall back to site root.
        var baseUrls = [origin + basePath, origin + "/"];

        function loadScript(rel, idx, onDone) {
          if (idx >= baseUrls.length) {
            console.error("Failed to load script:", rel);
            onDone(false);
            return;
          }

          var url = new URL(rel, baseUrls[idx]).toString();
          var s = document.createElement("script");
          s.async = false;
          s.src = url;
          s.onload = function () {
            onDone(true);
          };
          s.onerror = function () {
            s.remove();
            loadScript(rel, idx + 1, onDone);
          };
          document.head.appendChild(s);
        }

        // Expose a tiny loader queue for the body to run after #app exists.
        window.__crownsLoad = function () {
          loadScript("_sdk/data_sdk.js", 0, function (ok1) {
            if (!ok1) return;
            loadScript("_sdk/element_sdk.js", 0, function (ok2) {
              if (!ok2) return;
              loadScript("planner.js", 0, function () {});
            });
          });
        };
      })();
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        box-sizing: border-box;
        font-family: "Lora", serif;
      }

      .heading-font {
        font-family: "Cinzel", serif;
      }

      .card-shadow {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .input-field {
        transition: all 0.3s ease;
      }

      .input-field:focus {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        outline: none;
      }

      .editable-field {
        transition: all 0.2s ease;
      }

      .editable-field:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
      }

      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 16px 24px;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        z-index: 9999;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
      }

      .modal-content {
        background: white;
        border-radius: 16px;
        max-width: 500px;
        width: 100%;
        max-height: 90%;
        overflow-y: auto;
      }
    </style>
    <style>
      @view-transition {
        navigation: auto;
      }
    </style>
  </head>
  <body class="h-full">
    <div id="app" class="w-full h-full overflow-auto"></div>
    <script>
      if (typeof window.__crownsLoad === "function") window.__crownsLoad();
    </script>
  </body>
</html>
